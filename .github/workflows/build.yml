name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo do build'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
  push:
    branches: [ "main", "master" ]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'app/build.gradle.kts'
      - 'gradle/**'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event_name == 'pull_request'
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact (Debug)
        if: github.event.inputs.build_type == 'debug' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sendfile-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK Artifact (Release)
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: sendfile-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: List APK files
        run: |
          echo "APK files:"
          find . -name "*.apk" -type f
